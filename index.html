<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的GitHub Pages主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 2px 5px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card:hover {
            transform: scale(1.01);
        }

        .header {
            background: #0a192f;
            color: white;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .content {
            padding: 2rem;
        }

        .intro {
            background: #eef2ff;
            padding: 1rem 1.2rem;
            border-radius: 1.2rem;
            margin-bottom: 2rem;
            color: #1e293b;
            font-size: 0.95rem;
            border-left: 4px solid #3b82f6;
        }

        .page-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .page-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            text-decoration: none;
            color: #0f172a;
            font-weight: 500;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .page-link:hover {
            border-color: #3b82f6;
            background: #f8fafc;
            transform: translateX(4px);
            box-shadow: 0 8px 20px -8px rgba(59,130,246,0.2);
        }

        .page-name {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.05rem;
        }

        .page-name span:first-child {
            font-size: 1.4rem;
        }

        .arrow {
            color: #3b82f6;
            font-size: 1.2rem;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .page-link:hover .arrow {
            transform: translateX(4px);
        }

        .badge {
            background: #e6f0ff;
            color: #1e40af;
            border-radius: 40px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .footer {
            border-top: 1px solid #e2edff;
            padding: 1.2rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #5b6e8c;
            background: #fafcff;
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 1.6rem; }
            .content { padding: 1.5rem; }
            .page-link { padding: 0.7rem 1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📁 我的文件库</h1>
        <p>GitHub Pages · 个人站点</p>
    </div>
    <div class="content">
        <div class="intro">
            ✨ 欢迎访问！这里列出了当前仓库中可查看的页面，点击即可访问。
        </div>
        <div class="page-list">
            <!-- 在这里添加你的页面，一行一个，格式如下 -->
            <a href="1.html" class="page-link">
                <div class="page-name">
                    <span>📄</span>
                    <span>1.html</span>
                </div>
                <div class="arrow">→</div>
            </a>

            <!-- 以后新增页面，复制上面一行，修改 href 和显示的文字即可 -->
            <!-- 
            <a href="2.html" class="page-link">
                <div class="page-name">
                    <span>🌟</span>
                    <span>2.html</span>
                </div>
                <div class="arrow">→</div>
            </a>
            -->
        </div>
        <div style="margin-top: 1.5rem; font-size: 0.75rem; color: #6c86a3; text-align: center;">
            💡 提示：直接访问根域名会看到本页，访问具体文件需加完整文件名。
        </div>
    </div>
    <div class="footer">
        <span>bushishixin · 由 GitHub Pages 驱动</span>
    </div>
</div>
</body>
</html>
