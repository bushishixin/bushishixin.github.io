<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ 安全警报 ⚠️</title>
    <style>
        body {
            background: #0a0f1e;
            font-family: 'Courier New', monospace;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            animation: flicker 0.15s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            100% { opacity: 0.98; }
        }
        h1 {
            color: #f00;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px red;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        .info-line {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
        }
        .label {
            color: #fff;
            font-weight: bold;
        }
        .value {
            color: #0f0;
        }
        .progress-bar {
            border: 1px solid #0f0;
            height: 20px;
            margin: 20px 0;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #f00,
                #f00 10px,
                #a00 10px,
                #a00 20px
            );
            animation: loading 8s linear infinite;
        }
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 67%; }
            100% { width: 67%; }
        }
        .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .punchline {
            color: #ff0;
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px yellow;
            border-top: 1px dashed #0f0;
            padding-top: 20px;
        }
        .small-note {
            color: #888;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }
        .fake-btn {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 16px;
            cursor: not-allowed;
            text-align: center;
            width: fit-content;
            margin: 20px auto 0;
            border-radius: 4px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>🚨 警告：检测到信息泄露 🚨</h1>
        
        <div class="info-line">
            <span class="label">IP 地址：</span>
            <span class="value" id="ip-display">正在定位...</span>
        </div>
        <div class="info-line">
            <span class="label">物理位置：</span>
            <span class="value" id="location-display">银河系·猎户臂·地球村·你心里</span>
        </div>
        <div class="info-line">
            <span class="label">泄露数据类型：</span>
            <span class="value">浏览记录 / 相册 / 深夜emo日记</span>
        </div>
        
        <div style="margin-top: 20px;">
            <span class="label">正在加密你的文件...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="info-line">
            <span class="label">状态：</span>
            <span class="value blink">数据上传中 (67%) —— 卡住了</span>
        </div>
        
        <div class="fake-btn">
            [ 立即阻止 ] (按钮已坏)
        </div>
        
        <!-- 戏精部分结束，下面是真相 -->
        <div class="punchline">
            😂 别怕，逗你玩的！ 😂<br>
        </div>
        <div class="small-note">
            * 此页面不会收集任何信息，纯属娱乐。
        </div>
    </div>

    <script>
        // 纯前端小把戏：显示一个假 IP 地址（不会真正获取）
        // 只是为了让页面看起来更真，实际上是随机拼接的
        const fakeIP = `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`;
        document.getElementById('ip-display').textContent = fakeIP;
        
        // 还可以加点假的控制台输出戏份
        console.log("%c警告：你的浏览器正在被监控！", "color: red; font-size: 20px; font-weight: bold;");
    </script>
</body>
</html>
